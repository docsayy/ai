<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My AI Chat</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #1a2245;
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent: #6ea8fe;
      --border: #2b376b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1d, #101731);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .app {
      width: 100%;
      max-width: 900px;
      background: rgba(18, 25, 51, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
    }
    .header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    #chat {
      height: 65vh;
      overflow-y: auto;
      padding: 18px;
      background: var(--panel-2);
    }
    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .user {
      margin-left: auto;
      background: #24407a;
    }
    .assistant {
      margin-right: auto;
      background: #1d284f;
      border: 1px solid var(--border);
    }
    .composer {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    #prompt {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0e1530;
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      outline: none;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      background: var(--accent);
      color: #081225;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .note {
      padding: 0 16px 14px;
      color: var(--muted);
      font-size: 12px;
      background: var(--panel);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>My AI Chat</h1>
      <p>Personal chat app with GitHub Pages + Cloudflare Worker</p>
    </div>

    <div id="chat">
      <div class="msg assistant">Hi — ask me anything.</div>
    </div>

    <div class="composer">
      <textarea id="prompt" placeholder="Type your message..."></textarea>
      <button id="sendBtn">Send</button>
    </div>

    <div class="note">
      Keep patient identifiers out of this unless you are fully allowed to use external AI tools for that content.
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const promptBox = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");

    // Replace this after you deploy your worker
    const API_URL = "https://YOUR-WORKER.your-subdomain.workers.dev/chat";

    const messages = [
      { role: "system", content: "You are a helpful assistant." }
    ];

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = promptBox.value.trim();
      if (!text) return;

      addMessage("user", text);
      messages.push({ role: "user", content: text });
      promptBox.value = "";
      sendBtn.disabled = true;

      const thinking = addMessage("assistant", "Thinking...");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText || `HTTP ${res.status}`);
        }

        const data = await res.json();
        thinking.textContent = data.output || "No response returned.";
        messages.push({ role: "assistant", content: data.output || "" });
      } catch (err) {
        thinking.textContent = "Error: " + err.message;
      } finally {
        sendBtn.disabled = false;
        promptBox.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    promptBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
