<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note AI Login</title>

  <style>
    :root {
      --bg: #f7f8fc;
      --card: rgba(255,255,255,0.75);
      --text: #111;
      --muted: #666;
      --btn: linear-gradient(135deg,#5b7cff,#7a5cff);
    }

    body.dark {
      --bg: #0b0f1a;
      --card: rgba(20,25,40,0.7);
      --text: #f0f4ff;
      --muted: #9aa5b5;
      --btn: linear-gradient(135deg,#6f8cff,#8e63ff);
    }

    body {
      margin:0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      overflow:hidden;
    }

    /* subtle floating blobs */
    .blob {
      position:absolute;
      border-radius:50%;
      filter: blur(60px);
      opacity:0.4;
      animation: float 20s infinite alternate ease-in-out;
    }

    .blob1 { width:300px;height:300px;background:#6f8cff; top:-50px; left:-50px; }
    .blob2 { width:250px;height:250px;background:#00d0ff; bottom:-50px; right:-50px; }

    @keyframes float {
      0% { transform: translate(0,0); }
      100% { transform: translate(40px,-40px); }
    }

    .card {
      position:relative;
      z-index:2;
      width:320px;
      padding:25px;
      border-radius:20px;
      background: var(--card);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    h2 { margin:0 0 10px; }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:15px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      background: var(--btn);
      color:white;
      font-size:15px;
      cursor:pointer;
    }

    .msg {
      margin-top:10px;
      font-size:14px;
      color:red;
      min-height:18px;
    }
  </style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  // auto day/night
  function setTheme() {
    const h = new Date().getHours();
    document.body.classList.toggle('dark', h >= 19 || h < 7);
  }
  setTheme();

  function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    const msg = document.getElementById('msg');

    if (u === "msayyar" && p === "@Ahmad2020") {
      msg.style.color = "green";
      msg.textContent = "Access granted";

      setTimeout(() => {
        window.location.href = "app.html";
      }, 800);

    } else {
      msg.style.color = "red";
      msg.textContent = "Incorrect username or password";
    }
  }
</script>

</body>
</html>
