<!DOCTYPE html>
<html>
<head>
  <title>Note AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 820px;
      margin: auto;
      padding: 20px;
      line-height: 1.4;
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
    }

    button {
      padding: 10px 18px;
      margin-top: 12px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status-wrap {
      margin-top: 14px;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #444;
      font-size: 15px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #ddd;
      border-top: 3px solid #111;
      border-radius: 50%;
      display: none;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .spinner.show {
      display: inline-block;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 1.5em;
      text-align: left;
      animation: dots 1.2s steps(4, end) infinite;
    }

    .meta {
      color: #666;
      font-size: 14px;
    }

    pre {
      background: #f5f5f5;
      padding: 14px;
      white-space: pre-wrap;
      border-radius: 10px;
      min-height: 120px;
      border: 1px solid #e5e5e5;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }
  </style>
</head>
<body>
  <h2>Note AI</h2>

  <textarea id="input" placeholder="Paste your note..."></textarea>
  <br>
  <button id="fixBtn" onclick="send()">Fix Note</button>

  <div class="status-wrap">
    <div id="spinner" class="spinner"></div>
    <div id="status"></div>
    <div id="meta" class="meta"></div>
  </div>

  <h3>Output</h3>
  <pre id="output"></pre>

  <script>
    let timerInterval = null;
    let dotInterval = null;
    let startTime = null;

    function startLoadingUI() {
      const spinner = document.getElementById("spinner");
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");

      spinner.classList.add("show");
      status.innerHTML = 'Thinking<span class="dots"></span>';
      meta.textContent = "0.0s";
      startTime = Date.now();

      timerInterval = setInterval(() => {
        const seconds = ((Date.now() - startTime) / 1000).toFixed(1);
        meta.textContent = `${seconds}s elapsed`;
      }, 100);
    }

    function stopLoadingUI(finalStatus) {
      const spinner = document.getElementById("spinner");
      const status = document.getElementById("status");

      spinner.classList.remove("show");
      status.textContent = finalStatus;

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    async function send() {
      const text = document.getElementById("input").value.trim();
      const output = document.getElementById("output");
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");
      const btn = document.getElementById("fixBtn");

      if (!text) {
        status.textContent = "Please paste a note first.";
        meta.textContent = "";
        output.textContent = "";
        return;
      }

      btn.disabled = true;
      output.textContent = "";
      startLoadingUI();

      try {
        const res = await fetch("https://ai.homestream.online/fix-note", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const raw = await res.text();

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${raw}`);
        }

        let data;
        try {
          data = JSON.parse(raw);
        } catch (e) {
          throw new Error("Response was not valid JSON: " + raw);
        }

        output.textContent = data.output || "No output returned.";
        stopLoadingUI("Done.");
      } catch (err) {
        output.textContent = err.message;
        stopLoadingUI("Request failed.");
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
