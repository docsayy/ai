<!DOCTYPE html>
<html>
<head>
  <title>Note AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-size: 16px;
      padding: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>🧠 Note AI</h2>

<textarea id="input" placeholder="Paste your note..."></textarea>
<br>
<button onclick="send()">Fix Note</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
async function send() {
  const text = document.getElementById("input").value;

  const res = await fetch("https://ai.homestream.online/fix-note", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  document.getElementById("output").textContent = data.output;
}
</script>

</body>
</html>
